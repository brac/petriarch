<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Petriarch</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #05070a;
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      #app canvas {
        display: block;
      }
      /* Perf overlay — plain DOM so it costs the Pixi pipeline nothing. */
      #perf {
        position: fixed;
        top: 8px;
        left: 8px;
        z-index: 10;
        padding: 6px 8px;
        font-size: 12px;
        line-height: 1.35;
        color: #00ffcc;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(0, 255, 204, 0.25);
        border-radius: 4px;
        white-space: pre;
        pointer-events: none;
        user-select: none;
      }
      /* Controls — intensity + sim-speed (the two first-class milestone-1 knobs). */
      #controls {
        position: fixed;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        display: flex;
        gap: 18px;
        align-items: center;
        padding: 8px 14px;
        font-size: 12px;
        color: #b8f7e8;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(0, 255, 204, 0.2);
        border-radius: 6px;
        user-select: none;
      }
      #controls label {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      #controls input[type="range"] {
        width: 120px;
        accent-color: #00ffcc;
      }
      #pop {
        color: #00ffcc;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="perf"></div>
    <div id="controls">
      <label>intensity <input id="intensity" type="range" min="0" max="1" step="0.01" value="1" /></label>
      <label>sim&nbsp;speed <input id="simspd" type="range" min="0" max="8" step="0.1" value="1" /></label>
      <span>pop&nbsp;<span id="pop">0</span></span>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
